<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GCS Graph Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1d23; font-family: 'Segoe UI', Arial, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    #info-panel {
      position: absolute; top: 10px; left: 10px;
      background: rgba(30,33,40,0.92); border: 1px solid #444;
      border-radius: 8px; padding: 14px 18px; color: #ddd;
      font-size: 13px; max-width: 320px; backdrop-filter: blur(6px);
    }
    #info-panel h2 { font-size: 15px; color: #8cf; margin-bottom: 8px; }
    #info-panel .stat { margin: 3px 0; }
    #info-panel .stat span { color: #8cf; font-weight: 600; }
    #legend {
      position: absolute; bottom: 10px; left: 10px;
      background: rgba(30,33,40,0.92); border: 1px solid #444;
      border-radius: 8px; padding: 12px 16px; color: #ddd;
      font-size: 12px; backdrop-filter: blur(6px);
    }
    #legend h3 { font-size: 13px; color: #8cf; margin-bottom: 6px; }
    #legend .item { margin: 2px 0; display: flex; align-items: center; gap: 6px; }
    #legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #666; }
    #controls-hint {
      position: absolute; top: 10px; right: 10px;
      background: rgba(30,33,40,0.85); border: 1px solid #444;
      border-radius: 8px; padding: 10px 14px; color: #999;
      font-size: 11px; backdrop-filter: blur(6px);
    }
    #file-input-wrap {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(30,33,40,0.92); border: 1px solid #444;
      border-radius: 8px; padding: 10px 14px; color: #ddd;
      font-size: 12px; backdrop-filter: blur(6px);
    }
    #file-input-wrap input { color: #ccc; background: #2a2d35; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; }
    #file-input-wrap button { color: #fff; background: #4488cc; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin-left: 6px; }
    #file-input-wrap button:hover { background: #5599dd; }
  </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="info-panel">
  <h2>GCS Graph Viewer</h2>
  <div id="stats-content">Loading...</div>
</div>

<div id="legend">
  <h3>Legend</h3>
  <div id="legend-content"></div>
</div>

<div id="controls-hint">
  Drag: rotate | Scroll: zoom | Right-drag: pan
</div>

<div id="file-input-wrap">
  <input type="text" id="file-input" value="g1_graph.txt" style="width:160px">
  <button onclick="loadFromInput()">Load</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script>
const RIGID_SET_COLORS = [
  0xe6194b, 0x3cb44b, 0x4363d8, 0xf58231, 0x911eb4,
  0x42d4f4, 0xf032e6, 0xbfef45, 0xfabed4, 0x469990
];
const CONSTRAINT_COLORS = {
  0: 0xff4444,
  1: 0x44ff44,
  2: 0x4444ff,
  3: 0xffaa00,
  4: 0xff44ff
};
const CONSTRAINT_NAMES = {
  0: 'Coincident', 1: 'Parallel', 2: 'Perpendicular',
  3: 'Distance', 4: 'Angle'
};
const GEOM_NAMES = { 0: 'Point', 1: 'Line', 2: 'Plane' };

function getQueryParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

async function loadGraph(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Failed: ' + resp.statusText);
  return await resp.text();
}

function parseGraph(text) {
  const toks = text.replace(/\r/g,'').split(/\s+/).filter(s=>s.length>0);
  let idx = 0;
  const next = () => toks[idx++];

  const numRigid = parseInt(next());
  const rigidSets = [];
  for (let i=0;i<numRigid;++i) {
    rigidSets.push({ id: parseInt(next()), geometryIds: [] });
  }

  const numGeom = parseInt(next());
  const geometries = [];
  for (let i=0;i<numGeom;++i) {
    const g = { id: parseInt(next()), type: parseInt(next()), rs: parseInt(next()), v: [0,0,0,0,0,0] };
    geometries.push(g);
    for (const rs of rigidSets) {
      if (rs.id === g.rs) { rs.geometryIds.push(g.id); break; }
    }
  }

  const numConst = parseInt(next());
  const constraints = [];
  for (let i=0;i<numConst;++i) {
    const c = { id: parseInt(next()), type: parseInt(next()), gids: [] };
    const n = parseInt(next());
    for (let j=0;j<n;++j) c.gids.push(parseInt(next()));
    c.value = 0;
    constraints.push(c);
  }

  for (let i=0;i<numGeom;++i) {
    const id = parseInt(next());
    const g = geometries.find(x=>x.id===id);
    for (let k=0;k<6;++k) g.v[k] = parseFloat(next());
  }

  while (idx < toks.length) {
    const id = parseInt(next());
    const val = parseFloat(next());
    const c = constraints.find(x=>x.id===id);
    if (c) c.value = val;
  }

  return { rigidSets, geometries, constraints };
}

function getRsColor(rsId, rigidSets) {
  for (let i=0;i<rigidSets.length;++i) {
    if (rigidSets[i].id === rsId) return RIGID_SET_COLORS[i % RIGID_SET_COLORS.length];
  }
  return 0x888888;
}

function buildScene(graph) {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1d23);

  const axes = new THREE.AxesHelper(2);
  scene.add(axes);

  const gridHelper = new THREE.GridHelper(10, 10, 0x333333, 0x222222);
  scene.add(gridHelper);

  const geomMap = {};

  for (const g of graph.geometries) {
    const color = getRsColor(g.rs, graph.rigidSets);

    if (g.type === 0) {
      const mat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), mat);
      mesh.position.set(g.v[0], g.v[1], g.v[2]);
      scene.add(mesh);
      geomMap[g.id] = mesh;

      const label = makeLabel(`G${g.id}`, color);
      label.position.set(g.v[0], g.v[1]+0.12, g.v[2]);
      scene.add(label);

    } else if (g.type === 1) {
      const p1 = new THREE.Vector3(g.v[0],g.v[1],g.v[2]);
      const p2 = new THREE.Vector3(g.v[3],g.v[4],g.v[5]);
      const lineGeom = new THREE.BufferGeometry().setFromPoints([p1,p2]);
      const lineMat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
      const line = new THREE.Line(lineGeom, lineMat);
      scene.add(line);
      geomMap[g.id] = line;

      [p1, p2].forEach((pt, idx) => {
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.03, 8, 8),
          new THREE.MeshPhongMaterial({ color })
        );
        dot.position.copy(pt);
        scene.add(dot);
      });

      const mid = p1.clone().add(p2).multiplyScalar(0.5);
      const label = makeLabel(`G${g.id}`, color);
      label.position.copy(mid).add(new THREE.Vector3(0, 0.1, 0));
      scene.add(label);

    } else if (g.type === 2) {
      const pos = new THREE.Vector3(g.v[0],g.v[1],g.v[2]);
      const n = new THREE.Vector3(g.v[3],g.v[4],g.v[5]).normalize();
      const planeGeom = new THREE.PlaneGeometry(2, 2);
      const planeMat = new THREE.MeshPhongMaterial({
        color, side: THREE.DoubleSide, opacity: 0.3, transparent: true
      });
      const mesh = new THREE.Mesh(planeGeom, planeMat);
      const up = new THREE.Vector3(0,0,1);
      mesh.quaternion.setFromUnitVectors(up, n);
      mesh.position.copy(pos);
      scene.add(mesh);
      geomMap[g.id] = mesh;

      const edgeMat = new THREE.LineBasicMaterial({ color, opacity: 0.6, transparent: true });
      const edges = new THREE.LineSegments(new THREE.EdgesGeometry(planeGeom), edgeMat);
      edges.quaternion.copy(mesh.quaternion);
      edges.position.copy(mesh.position);
      scene.add(edges);

      const label = makeLabel(`G${g.id}`, color);
      label.position.copy(pos).add(new THREE.Vector3(0, 0.15, 0));
      scene.add(label);
    }
  }

  for (const c of graph.constraints) {
    const color = CONSTRAINT_COLORS[c.type] || 0xffffff;
    const positions = [];
    for (const gid of c.gids) {
      const g = graph.geometries.find(x=>x.id===gid);
      if (!g) continue;
      if (g.type === 0) {
        positions.push(new THREE.Vector3(g.v[0],g.v[1],g.v[2]));
      } else if (g.type === 1) {
        positions.push(new THREE.Vector3((g.v[0]+g.v[3])/2,(g.v[1]+g.v[4])/2,(g.v[2]+g.v[5])/2));
      } else if (g.type === 2) {
        positions.push(new THREE.Vector3(g.v[0],g.v[1],g.v[2]));
      }
    }

    for (let i=0;i<positions.length;++i) {
      for (let j=i+1;j<positions.length;++j) {
        const dashGeom = new THREE.BufferGeometry().setFromPoints([positions[i], positions[j]]);
        const dashMat = new THREE.LineDashedMaterial({
          color, dashSize: 0.1, gapSize: 0.05, linewidth: 1.5
        });
        const dashLine = new THREE.Line(dashGeom, dashMat);
        dashLine.computeLineDistances();
        scene.add(dashLine);

        const mid = positions[i].clone().add(positions[j]).multiplyScalar(0.5);
        let labelText = `C${c.id}(${CONSTRAINT_NAMES[c.type]||'?'})`;
        if (c.value !== 0) labelText += `=${c.value}`;
        const label = makeLabel(labelText, color, 0.7);
        label.position.copy(mid).add(new THREE.Vector3(0, -0.08, 0));
        scene.add(label);
      }
    }
  }

  return { scene, geomMap };
}

function makeLabel(text, color, scale) {
  scale = scale || 1;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256; canvas.height = 64;
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.5 * scale, 0.125 * scale, 1);
  return sprite;
}

function updateInfoPanel(graph) {
  const el = document.getElementById('stats-content');
  let html = '';
  html += `<div class="stat">Rigid Sets: <span>${graph.rigidSets.length}</span></div>`;
  html += `<div class="stat">Geometries: <span>${graph.geometries.length}</span></div>`;
  html += `<div class="stat">Constraints: <span>${graph.constraints.length}</span></div>`;
  html += '<hr style="border-color:#444;margin:6px 0">';
  html += '<div style="font-size:11px;color:#aaa">';
  for (const rs of graph.rigidSets) {
    html += `<div>RS${rs.id}: [${rs.geometryIds.join(', ')}]</div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function updateLegend(graph) {
  const el = document.getElementById('legend-content');
  let html = '';
  for (let i=0;i<graph.rigidSets.length;++i) {
    const c = '#' + new THREE.Color(RIGID_SET_COLORS[i % RIGID_SET_COLORS.length]).getHexString();
    html += `<div class="item"><div class="swatch" style="background:${c}"></div>RS ${graph.rigidSets[i].id}</div>`;
  }
  html += '<div style="margin-top:6px;border-top:1px solid #444;padding-top:4px">';
  for (const [type, color] of Object.entries(CONSTRAINT_COLORS)) {
    const c = '#' + new THREE.Color(color).getHexString();
    html += `<div class="item"><div class="swatch" style="background:${c}"></div>${CONSTRAINT_NAMES[type]}</div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

async function main(graphFile) {
  try {
    const graphText = await loadGraph(graphFile);
    const graph = parseGraph(graphText);

    const container = document.getElementById('canvas-container');
    const width = window.innerWidth, height = window.innerHeight;
    const camera = new THREE.PerspectiveCamera(60, width/height, 0.1, 1000);
    camera.position.set(3, 3, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const { scene } = buildScene(graph);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.update();

    const ambient = new THREE.AmbientLight(0x404040, 0.8);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 7.5);
    scene.add(dirLight);

    updateInfoPanel(graph);
    updateLegend(graph);

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  } catch (e) {
    document.body.innerHTML = '<pre style="color:#f88;padding:20px">' + e.toString() + '</pre>';
  }
}

function loadFromInput() {
  const file = document.getElementById('file-input').value;
  if (file) main(file);
}

const file = getQueryParam('file') || 'g1_graph.txt';
main(file);
</script>
</body>
</html>
