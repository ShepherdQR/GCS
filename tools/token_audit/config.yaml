# GCS Token Audit — 默认配置
# 可通过 python -m tools.token_audit config set <key> <value> 修改

# BEI 权重配置
bei:
  weights:
    output: 0.30
    quality: 0.25
    decision: 0.20
    knowledge: 0.10
    efficiency: 0.15

  # 无历史数据时的默认 baseline
  baselines:
    output_per_1M_tokens: 200        # LoC per 1M tokens
    ideal_cost_per_commit_usd: 0.50
    max_memory_entries: 3
    max_skill_invocations: 5

# 告警阈值
alerts:
  max_cost_per_session_usd: 2.00
  efficiency_drop_threshold: 0.5     # 50% below 7-day average
  cache_drop_threshold: 0.7          # 70% of 7-day average
  rejection_rate_threshold: 0.40     # 40%
  agent_loop_min_repetition: 3
  agent_loop_window_minutes: 10
  cooldown:
    per_session: 1
    per_30min: 1
  # 燃尽速率预警
  budgets:
    per_session_usd: 2.00
    per_session_critical_usd: 5.00
    per_day_usd: 10.00
    per_week_usd: 50.00
  burn_rate:
    window_ticks: 10             # 用于斜率计算的最大数据点
    min_ticks_for_prediction: 5  # 启动预测所需的最小数据点
    warning_minutes: 30          # 预计在 <30 分钟内超支时警告
    critical_minutes: 10         # 预计在 <10 分钟内超支时严重警告

# 模型定价 (USD per 1M tokens)
# 数据来源: 官网最新定价, 2026-05
# Anthropic: https://docs.anthropic.com/en/docs/about-claude/pricing
# DeepSeek: https://api-docs.deepseek.com/zh-cn/quick_start/pricing (2026-05-31 永久降价生效)
pricing:
  anthropic:
    claude-opus-4-7:
      input: 5.00
      output: 25.00
      batch_input: 2.50       # Batch API: 50% off input
      batch_output: 12.50     # Batch API: 50% off output
      cache_write_5min: 6.25  # 1.25x input (5-min TTL)
      cache_write_1hour: 10.00 # 2.0x input (1-hour TTL)
      cache_read: 0.50        # 90% off input
    claude-sonnet-4-6:
      input: 3.00
      output: 15.00
      batch_input: 1.50
      batch_output: 7.50
      cache_write_5min: 3.75
      cache_write_1hour: 6.00
      cache_read: 0.30
    claude-haiku-4-5:
      input: 1.00
      output: 5.00
      batch_input: 0.50
      batch_output: 2.50
      cache_write_5min: 1.25
      cache_write_1hour: 2.00
      cache_read: 0.10
    claude-sonnet-4-5:
      input: 3.00
      output: 15.00
      batch_input: 1.50
      batch_output: 7.50
      cache_write_5min: 3.75
      cache_write_1hour: 6.00
      cache_read: 0.30
  # Non-Anthropic models
  other:
    deepseek-v4-pro:
      input: 0.435         # 缓存未命中 (≈¥3.00/1M)
      output: 0.87         # (≈¥6.00/1M)
      cache_write: 0.435   # 无额外缓存写入费用
      cache_read: 0.0035   # 缓存命中 (≈¥0.025/1M)

# 项目 ROI 估算参数
roi:
  avg_hours_per_commit_without_ai: 1.5
  hourly_dev_rate_usd: 75.0

# 实时监控
watch:
  default_interval_seconds: 5
  session_idle_timeout_seconds: 120   # 超过此时间无新记录视为 session 结束

# 报告
report:
  default_format: markdown
  max_tool_results_chars: 500         # 工具结果截断长度
  default_pricing_model: deepseek-v4-pro  # 报告默认计费模型 (deepseek-v4-pro / anthropic / 具体模型名)
