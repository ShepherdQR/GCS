    <text class="small muted" x="44" y="-10">1. D1/D2 behavior demo packages with command evidence</text>
    <text class="small muted" x="44" y="14">2. Release-readiness checklist and package smoke path</text>
    <text class="small muted" x="470" y="-10">3. External solver comparison and benchmark plan</text>
    <text class="small muted" x="470" y="14">4. Audience, distribution, contribution, and open-source strategy brief</text>
    <text class="small muted" x="984" y="-10">5. Governance prompt evals for staging, audit overclaim, and role promotion</text>
